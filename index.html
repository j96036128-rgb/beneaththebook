/* ── Fade-in on scroll ── */
function FadeIn({ children, style, delay = 0 }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold: 0.15 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} style={{ opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(24px)",
      transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`, ...style }}>
      {children}
    </div>
  );
}

/* ── Animated counter ── */
function Counter({ end, suffix = "", prefix = "", duration = 2000 }) {
  const ref = useRef(null);
  const [val, setVal] = useState(0);
  const started = useRef(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const start = performance.now();
        const tick = (now) => {
          const p = Math.min((now - start) / duration, 1);
          setVal(Math.floor(p * end));
          if (p < 1) requestAnimationFrame(tick);
          else setVal(end);
        };
        requestAnimationFrame(tick);
        obs.disconnect();
      }
    }, { threshold: 0.3 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [end, duration]);
  return <span ref={ref}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

/* ── Live equity curve from report data ── */
function LiveEquityCurve({ curve, curvePos, curveNeg }) {
  if (!curve || curve.length < 2) return null;
  const W = 560, H = 160, PAD = 10;

  function buildPath(data) {
    if (!data || data.length < 2) return "";
    const vals = data.map(d => d.cumulative);
    const minV = Math.min(...vals, 0);
    const maxV = Math.max(...vals, 1);
    const range = maxV - minV || 1;
    return data.map((d, i) => {
      const x = PAD + (i / (data.length - 1)) * (W - 2 * PAD);
      const y = H - PAD - ((d.cumulative - minV) / range) * (H - 2 * PAD);
      return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
  }

  const allPath = buildPath(curve);
  const posPath = buildPath(curvePos);
  const negPath = buildPath(curveNeg);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: H }}>
      {[0,1,2,3,4].map(i => <line key={i} x1={0} y1={i*40} x2={W} y2={i*40} stroke="rgba(255,255,255,0.04)" />)}

      <text x={10} y={20} fill={GOLD} fontSize="10" fontFamily="Helvetica Neue" opacity="0.6">All</text>
    </svg>
  );
}

                  ))}
                </div>
                <a href="#submit" style={{ display: "block", textAlign: "center", marginTop: 24, padding: "12px 0",
                  background: tier.highlight ? GOLD : "transparent", color: tier.highlight ? BG : GOLD,
                  border: tier.highlight ? "none" : `1px solid ${BORDER_GOLD_LINE}`,
                  borderRadius: 4, fontWeight: 700, fontSize: 13, letterSpacing: 2, textDecoration: "none",
                  textTransform: "uppercase", cursor: "pointer" }}>
                  {tier.price === "FREE" ? "CLAIM FREE AUDIT" : "GET STARTED"}
                </a>
              </div>
            ))}
          </div>
        </FadeIn>
      </section>

      {/* ── SUBMIT STRATEGY ── */}
      <section id="submit" style={{ maxWidth: 700, margin: "0 auto", padding: "80px 24px" }}>
        <FadeIn><SectionHeader title="Submit Your Strategy" /></FadeIn>
        <FadeIn delay={0.1}>
          <div style={{ background: BG_CARD, border: `1px solid ${BORDER_GOLD}`, borderRadius: 4, padding: 32 }}>
            {phase === "input" && (
              <>
                <div style={{ fontSize: 14, color: SECONDARY, marginBottom: 16 }}>
                  Describe your trading strategy in plain English. Include entry trigger, stop loss, target, session, and any filters.
                </div>
                <textarea value={strategy} onChange={(e) => setStrategy(e.target.value)}
                  placeholder="Example: I buy at the prior day's low when price touches it during RTH. Stop 4 ticks below, target 8 ticks..."
                  style={{ width: "100%", minHeight: 140, background: "rgba(255,255,255,0.03)", border: `1px solid ${BORDER_GOLD_LINE}`,
                    borderRadius: 4, padding: 16, color: WHITE, fontSize: 14, fontFamily: "Helvetica Neue, sans-serif",
                    lineHeight: 1.6, resize: "vertical", outline: "none" }} />
                <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
                  {EXAMPLES.map((ex, i) => (
                    <button key={i} onClick={() => setStrategy(ex.text)}
                      style={{ background: "rgba(255,215,0,0.06)", border: `1px solid ${BORDER_GOLD_LINE}`, color: GOLD,
                        fontSize: 12, padding: "6px 14px", borderRadius: 16, cursor: "pointer", fontFamily: "Helvetica Neue, sans-serif" }}>
                      {ex.label}
                    </button>
                  ))}
                </div>
                <button onClick={handleSubmit}
                  style={{ width: "100%", marginTop: 24, padding: "14px 0", background: GOLD, color: BG,
                    border: "none", borderRadius: 4, fontSize: 14, fontWeight: 800, letterSpacing: 3,
                    cursor: strategy.trim() ? "pointer" : "not-allowed", opacity: strategy.trim() ? 1 : 0.4,
                    fontFamily: "Helvetica Neue, sans-serif", textTransform: "uppercase" }}>
                  ANALYSE MY STRATEGY
                </button>
              </>
            )}

            {phase === "parsing" && (
              <div style={{ textAlign: "center", padding: "40px 0" }}>
                <Spinner />
                <div style={{ marginTop: 16, fontSize: 14, color: SECONDARY }}>Parsing your strategy...</div>
                <div style={{ marginTop: 8, fontSize: 12, color: MUTED }}>Identifying entry triggers, stops, targets, and filters</div>
              </div>
            )}

            {phase === "confirm" && parsedConfig && (
              <>
                <div style={{ fontSize: 14, color: BULLISH, fontWeight: 600, marginBottom: 16 }}>&#10003; Strategy parsed successfully</div>
                <div style={{ background: "rgba(0,0,0,0.3)", borderRadius: 4, overflow: "hidden", marginBottom: 24 }}>
                  {Object.entries(parsedConfig).map(([key, val], i, arr) => (
                    <div key={key} style={{ display: "flex", borderBottom: i < arr.length - 1 ? `1px solid ${BORDER_GOLD}` : "none" }}>
                      <div style={{ flex: "0 0 160px", padding: "10px 16px", fontSize: 12, color: MUTED, fontWeight: 600,
                        letterSpacing: 1, textTransform: "uppercase", borderRight: `1px solid ${BORDER_GOLD}` }}>{formatFieldName(key)}</div>
                      <div style={{ flex: 1, padding: "10px 16px", fontSize: 14, color: WHITE, fontWeight: 600 }}>{formatFieldValue(val)}</div>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 12 }}>
                  <button onClick={handleReset}
                    style={{ flex: 1, padding: "12px 0", background: "transparent", border: `1px solid ${BORDER_GOLD_LINE}`,
                      color: SECONDARY, borderRadius: 4, fontSize: 13, cursor: "pointer", fontFamily: "Helvetica Neue, sans-serif" }}>
                    Edit Strategy
                  </button>
                  <button onClick={handleConfirm}
                    style={{ flex: 2, padding: "12px 0", background: GOLD, color: BG, border: "none",
                      borderRadius: 4, fontSize: 13, fontWeight: 800, letterSpacing: 2, cursor: "pointer",
                      fontFamily: "Helvetica Neue, sans-serif", textTransform: "uppercase" }}>
                    CONFIRM &mdash; RUN FULL AUDIT
                  </button>
                </div>
              </>
            )}

            {phase === "running" && (
              <div style={{ textAlign: "center", padding: "50px 0" }}>
                <Spinner />
                <div style={{ marginTop: 20, fontSize: 16, fontWeight: 700, color: GOLD, letterSpacing: 2 }}>RUNNING BACKTEST</div>
                <div style={{ marginTop: 12, fontSize: 14, color: SECONDARY }}>Analysing against 3,505 days of regime-tagged data...</div>
                <div style={{ marginTop: 8, fontSize: 12, color: MUTED }}>This may take up to 60 seconds</div>
              </div>
            )}

            {phase === "results" && report && (() => {
              const o = report.overall || {};
              const p = report.positive_gamma || {};
              const n = report.negative_gamma || {};
              const recs = report.recommendations || [];
              return (
                <>
                  <div style={{ fontSize: 14, color: BULLISH, fontWeight: 600, marginBottom: 24 }}>&#10003; Audit Complete &mdash; {report.strategy || "Strategy"}</div>

                  {/* Stat boxes */}
                  <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 24 }}>
                    <StatBox value={`${o.win_rate || 0}%`} label="Win Rate" />
                    <StatBox value={o.sharpe || 0} label="Sharpe Ratio" color={BULLISH} />
                    <StatBox value={o.profit_factor || 0} label="Profit Factor" color={BEARISH_LIGHT} />
                  </div>

                  {/* Overall stats */}
                  <div style={{ background: "rgba(0,0,0,0.3)", borderRadius: 4, padding: "16px 20px", marginBottom: 24, fontSize: 13, color: SECONDARY, lineHeight: 2 }}>
                    <span style={{ color: GOLD }}>Trades:</span> {o.trades || 0} &nbsp;|&nbsp;
                    <span style={{ color: GOLD }}>Wins:</span> {o.wins || 0} &nbsp;|&nbsp;
                    <span style={{ color: GOLD }}>Losses:</span> {o.losses || 0} &nbsp;|&nbsp;
                    <span style={{ color: GOLD }}>Total P&amp;L:</span> <span style={{ color: (o.total_pnl||0) >= 0 ? BULLISH : BEARISH }}>{(o.total_pnl||0) >= 0 ? '+' : ''}{o.total_pnl || 0}pts (${(o.total_pnl_dollars||0).toLocaleString()})</span> &nbsp;|&nbsp;
                    <span style={{ color: GOLD }}>Max DD:</span> {o.max_drawdown || 0}pts &nbsp;|&nbsp;
                    <span style={{ color: GOLD }}>Period:</span> {(report.date_range||{}).start} &rarr; {(report.date_range||{}).end}
                  </div>

                  {/* Regime edge */}
                  <div style={{ background: BG_CARD, border: `1px solid ${BORDER_GOLD}`, borderRadius: 4, padding: 24, marginBottom: 24 }}>
                    <div style={{ fontSize: 12, letterSpacing: 4, color: GOLD, fontWeight: 700, marginBottom: 20, textTransform: "uppercase" }}>Regime Edge</div>
                    <div style={{ display: "flex", gap: 16, flexWrap: "wrap", justifyContent: "center" }}>
                      <div style={{ flex: "1 1 180px", textAlign: "center", padding: 20, background: "rgba(0,255,204,0.04)", borderRadius: 4, border: `1px solid rgba(0,255,204,0.15)` }}>
                        <div style={{ fontSize: 11, color: SECONDARY, letterSpacing: 2, marginBottom: 6 }}>POSITIVE GAMMA</div>
                        <div style={{ fontSize: 40, fontWeight: 800, color: BULLISH }}>{p.win_rate || 0}%</div>
                        <div style={{ fontSize: 12, color: BULLISH_DIM, marginTop: 4 }}>{p.trades || 0} trades &middot; PF {p.profit_factor || 0}</div>
                      </div>
                      <div style={{ flex: "1 1 180px", textAlign: "center", padding: 20, background: "rgba(255,68,68,0.04)", borderRadius: 4, border: `1px solid rgba(255,68,68,0.15)` }}>
                        <div style={{ fontSize: 11, color: SECONDARY, letterSpacing: 2, marginBottom: 6 }}>NEGATIVE GAMMA</div>
                        <div style={{ fontSize: 40, fontWeight: 800, color: BEARISH }}>{n.win_rate || 0}%</div>
                        <div style={{ fontSize: 12, color: BEARISH_LIGHT, marginTop: 4 }}>{n.trades || 0} trades &middot; PF {n.profit_factor || 0}</div>
                      </div>
                    </div>
                  </div>

                  {/* Equity curve */}
                  <div style={{ background: BG_CARD, border: `1px solid ${BORDER_GOLD}`, borderRadius: 4, padding: "20px 20px 12px", marginBottom: 24 }}>
                    <div style={{ fontSize: 12, letterSpacing: 4, color: GOLD, fontWeight: 700, marginBottom: 12, textTransform: "uppercase" }}>Equity Curve by Regime</div>
                    <LiveEquityCurve curve={report.equity_curve} curvePos={report.equity_curve_positive} curveNeg={report.equity_curve_negative} />
                  </div>

                  {/* VIX Quadrants */}
                  {report.vix_quadrants && Object.keys(report.vix_quadrants).length > 0 && (
                    <div style={{ background: BG_CARD, border: `1px solid ${BORDER_GOLD}`, borderRadius: 4, padding: "20px 20px", marginBottom: 24 }}>
                      <div style={{ fontSize: 12, letterSpacing: 4, color: GOLD, fontWeight: 700, marginBottom: 16, textTransform: "uppercase" }}>VIX Quadrants</div>
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                        {[["low_pos","Low VIX / +G"],["low_neg","Low VIX / -G"],["high_pos","High VIX / +G"],["high_neg","High VIX / -G"]].map(([k,label]) => {
                          const q = (report.vix_quadrants||{})[k];
                          if (!q) return null;
                          return (
                            <div key={k} style={{ flex: "1 1 120px", textAlign: "center", padding: "12px 8px", background: "rgba(0,0,0,0.2)", borderRadius: 4 }}>
                              <div style={{ fontSize: 10, color: MUTED, letterSpacing: 1, marginBottom: 4 }}>{label}</div>
                              <div style={{ fontSize: 20, fontWeight: 800, color: q.win_rate > (o.win_rate||0) ? BULLISH : BEARISH }}>{q.win_rate}%</div>
                              <div style={{ fontSize: 10, color: MUTED }}>{q.trades} trades</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* Recommendations */}
                  {recs.length > 0 && (
                    <div style={{ marginBottom: 24 }}>
                      <div style={{ fontSize: 12, letterSpacing: 4, color: GOLD, fontWeight: 700, marginBottom: 16, textTransform: "uppercase" }}>Recommendations</div>
                      {recs.map((r, i) => (
                        <div key={i} style={{ background: BG_CARD, borderLeft: `4px solid ${BULLISH}`, border: `1px solid ${BORDER_GOLD}`,
                          borderLeftColor: BULLISH, borderLeftWidth: 4, borderLeftStyle: "solid",
                          padding: "16px 20px", borderRadius: 4, marginBottom: 12 }}>
                          <div style={{ fontSize: 14, fontWeight: 700, color: WHITE, marginBottom: 4 }}>#{r.rank}: {r.title}</div>
                          <div style={{ fontSize: 13, color: BULLISH, marginBottom: 6 }}>{r.impact}</div>
                          <div style={{ fontSize: 13, color: SECONDARY, lineHeight: 1.5 }}>{r.description}</div>
                          {r.estimated_savings_dollars > 0 && (
                            <div style={{ marginTop: 8, fontSize: 13, color: BULLISH, fontWeight: 600 }}>
                              Estimated savings: ${r.estimated_savings_dollars.toLocaleString()}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Actions */}
                  <div style={{ display: "flex", gap: 12 }}>
                    <button onClick={handleReset}
                      style={{ flex: 1, padding: "12px 0", background: "transparent", border: `1px solid ${BORDER_GOLD_LINE}`,
                        color: GOLD, borderRadius: 4, fontSize: 13, cursor: "pointer", fontFamily: "Helvetica Neue, sans-serif",
                        letterSpacing: 1 }}>
                      Audit Another Strategy
                    </button>
                  </div>
                </>
              );
            })()}
          </div>
        </FadeIn>
      </section>

      {/* ── DATA CREDENTIALS ── */}
      <section style={{ maxWidth: 700, margin: "0 auto", padding: "40px 24px 80px" }}>
        <FadeIn>
          <div style={{ background: BG_CARD, border: `2px solid ${BORDER_GOLD_LINE}`, borderRadius: 4, padding: 32 }}>
            <div style={{ fontSize: 12, letterSpacing: 4, color: GOLD, fontWeight: 700, marginBottom: 24, textAlign: "center", textTransform: "uppercase" }}>Data Credentials</div>
            <div style={{ display: "flex", gap: 16, justifyContent: "center", flexWrap: "wrap" }}>
              {[
                { v: "3,505", l: "Trading Days" },
                { v: "12 Years", l: "History" },
                { v: "19,731", l: "Level Tests" },
                { v: "p < 0.001", l: "Significance" },
              ].map((d, i) => (
                <div key={i} style={{ textAlign: "center", padding: "12px 20px" }}>
                  <div style={{ fontSize: 20, fontWeight: 800, color: GOLD }}>{d.v}</div>
                  <div style={{ fontSize: 11, color: MUTED, letterSpacing: 1, marginTop: 4, textTransform: "uppercase" }}>{d.l}</div>
                </div>
              ))}
            </div>
          </div>
        </FadeIn>
      </section>

      {/* ── FOOTER ── */}
      <footer style={{ borderTop: `1px solid ${BORDER_GOLD}`, padding: "40px 24px", textAlign: "center" }}>
        <div style={{ fontSize: 13, letterSpacing: 6, color: GOLD, fontWeight: 700, marginBottom: 12 }}>BENEATH THE BOOK</div>
        <div style={{ fontSize: 13, color: MUTED, lineHeight: 1.6, maxWidth: 400, margin: "0 auto 16px" }}>
          Data-driven trading analysis.<br />Regime-conditional strategy audits for ES futures traders.
        </div>
        <div style={{ fontSize: 12, color: MUTED, marginBottom: 8 }}>
          TikTok: @beneaththebook &middot; Instagram: @beneaththebook
        </div>
        <div style={{ fontSize: 11, color: "rgba(102,119,136,0.5)" }}>&copy; 2025 Beneath The Book. All rights reserved.</div>
      </footer>

      {/* Spinner keyframes */}
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BTBStrategyAudit />);
</script>
</body>
</html>
